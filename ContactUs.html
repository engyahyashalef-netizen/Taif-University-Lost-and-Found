<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us – Taif University Lost &amp; Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet" type="text/css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="img/logo.png" alt="Taif University Logo" width="60">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="LostItems.html">Lost Items</a></li>
          <li class="nav-item"><a class="nav-link" href="FoundItems.html">Found Items</a></li>
          <li class="nav-item"><a class="nav-link" href="AddItems.html">Add Item</a></li>
          <li class="nav-item"><a class="nav-link active" href="ContactUs.html">Contact Us</a></li>
        </ul>
        <form class="d-flex" role="search" action="search_results.html" method="get">
          <input class="form-control me-2" type="search" name="q" placeholder="Search items…" aria-label="Search">
          <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
        <a class="btn btn-link nav-link ms-4" href="SignIn.html">Sign In</a>
      </div>
    </div>
  </nav>

  <!-- Contact Us Section -->
  <main class="container mt-5 pt-5" style="max-width:600px;">
    <h2 class="text-center mb-4">Contact Us</h2>

    <!-- Alert placeholder -->
    <div id="alert-placeholder"></div>

    <form action="process_contact.php" method="post" class="p-3 border rounded bg-light">
      <div class="mb-3">
        <label for="full_name" class="form-label">Full Name</label>
        <input id="full_name" name="full_name" type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input id="email" name="email" type="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="subject" class="form-label">Subject</label>
        <input id="subject" name="subject" type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="message" class="form-label">Message</label>
        <textarea id="message" name="message" class="form-control" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary w-100">Send Message</button>
    </form>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white pt-4 pb-4 mt-5">
    <div class="container">
      <div class="row">
        <div class="col-md-6 d-flex align-items-start">
          <img src="img/TaifLogo.png" alt="Taif University Logo" class="img-fluid me-3" style="max-width:80px;">
          <div>
            <h5>Taif University Lost &amp; Found</h5>
            <p>Phone: +966 12 123 4567</p>
            <p>Email: info@tu.edu.sa</p>
            <p>Address: P.O. Box 888, Taif 21944, Saudi Arabia</p>
          </div>
        </div>
        <div class="col-md-6 text-md-end">
          <div class="mb-2">
            <a href="https://www.linkedin.com/school/taif-university/" target="_blank" class="text-white mx-2">
              <i class="fab fa-linkedin fa-lg"></i>
            </a>
            <a href="https://www.facebook.com/TaifUniversity" target="_blank" class="text-white mx-2">
              <i class="fab fa-facebook fa-lg"></i>
            </a>
            <a href="https://www.instagram.com/taif_university" target="_blank" class="text-white mx-2">
              <i class="fab fa-instagram fa-lg"></i>
            </a>
          </div>
          <p class="mb-0">&copy; 2025 Taif University. All rights reserved.</p>
        </div>
      </div>
    </div>
  </footer>

  <!-- JS: handle ?success & ?error -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      if (!params.has('success')) return;

      const success = params.get('success');
      let msg = '', cls = '';
      if (success === '1') {
        msg = 'Your message has been received successfully. Thank you for contacting us!';
        cls = 'alert-success';
      } else {
        const err = params.get('error');
        if (err === 'validation') {
          msg = 'Please fill out all fields correctly.';
        } else {
          msg = 'Sorry, an error occurred while sending your message. Please try again later.';
        }
        cls = 'alert-danger';
      }

      document.getElementById('alert-placeholder').innerHTML = `
        <div class="alert ${cls} text-center" role="alert">
          ${msg}
        </div>`;
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://kit.fontawesome.com/63d76f3459.js" crossorigin="anonymous"></script>
</body>
</html>
